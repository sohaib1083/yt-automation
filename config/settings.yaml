video:
  width: 1920
  height: 1080   # 16:9 — standard YouTube landscape (most watched format)
  fps: 30         # 30fps for smooth playback
  codec: libx264
  bitrate: '6000k'  # higher bitrate for crisp 1080p

tts:
  # ElevenLabs (used when ELEVENLABS_API_KEY is set in .env)
  elevenlabs_voice_id: "21m00Tcm4TlvDq8ikWAM"  # Rachel — warm, clear female narrator
  elevenlabs_model: eleven_multilingual_v2
  # Fallback: gTTS
  lang: en

pexels:
  per_page: 5 # Fetch 5 candidates, pick first landscape
  orientation: landscape
  min_width: 1920

script:
  sections: 6 # Number of video sections to generate
  words_per_section: 80 # ~30 seconds of narration per section

youtube:
  channel_name: "AI Frontiers"
  category_id: '28'  # 28 = Science & Technology (best for AI content)
  privacy_status: public
  made_for_kids: false
  notify_subscribers: true
